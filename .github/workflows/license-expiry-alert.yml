name: License Expiry Alert

on:
  workflow_dispatch:
  schedule:
  - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install nodemailer
        run: npm install nodemailer

      - name: Check licenses and send email
        env:
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_ACCESS_KEY: ${{ secrets.JSONBIN_ACCESS_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}

        run: |
          cat > alert.js <<'EOF'

          const nodemailer = require("nodemailer");

          async function main() {

            const response = await fetch(
              `https://api.jsonbin.io/v3/b/${process.env.JSONBIN_BIN_ID}/latest`,
              {
                headers: {
                  "X-Access-Key": process.env.JSONBIN_ACCESS_KEY
                }
              }
            );

            if (!response.ok) {
              throw new Error(
                "JSONBin error: " + await response.text()
              );
            }

            const data = await response.json();

            const tools = data.record.tools || [];

            const today = new Date();

            // true = gửi tất cả để test
            // false = chỉ gửi license <= 90 ngày
            const TEST_SEND_ALL = false;

            const alertThreshold = 90;

            const licenses = tools.map(tool => {

              const renewal = new Date(tool.renewal);

              const daysLeft = Math.ceil(
                (renewal - today) / (1000 * 60 * 60 * 24)
              );

              return {
                name: tool.name || "",
                vendor: tool.vendor || "",
                renewal: tool.renewal || "",
                daysLeft,
                users: (tool.users || []).length,
                seats: tool.seats || 0,
                cost: tool.cost || 0
              };

            });

            const expiring = TEST_SEND_ALL
              ? licenses
              : licenses.filter(
                  t => t.daysLeft <= alertThreshold
                );

            if (!expiring.length) {
              console.log("No expiring licenses");
              return;
            }

            const body = expiring.map(t => {

              const costVND =
                Number(t.cost || 0)
                  .toLocaleString("vi-VN") + " VNĐ";

              return [
                `Software: ${t.name}`,
                `Vendor: ${t.vendor}`,
                `Renewal: ${t.renewal}`,
                `Days Left: ${t.daysLeft}`,
                `Users: ${t.users}`,
                `Seats: ${t.seats}`,
                `Cost: ${costVND}`,
                "-----------------------------------"
              ].join("\n");

            }).join("\n\n");

            const transporter =
              nodemailer.createTransport({
                service: "gmail",
                auth: {
                  user: process.env.GMAIL_USER,
                  pass: process.env.GMAIL_PASS
                }
              });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: "quang.phamvan@vib.com.vn",
              subject: "[VIB] License Expiry Alert",
              text:
                "Các license sắp hết hạn (<= 90 ngày):\n\n"
                + body
            });

            console.log("Email sent");
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });

          EOF

          node alert.js
